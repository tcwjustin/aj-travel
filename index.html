<meta name="theme-color" content="#5f9bb0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>

  :root{
    --paper:#fbf7ef;
    --paper-2:#ffffff;
    --kraft:#f0ece1;
    --kraft-deep:#e7ddcb;
    --ink:#43505a;
    --ink-soft:#9aa0a3;
    --terra:#5f9bb0;
    --terra-deep:#3c6b78;
    --honey:#e3b667;
    --sage:#7fae8b;
    --rose:#e08a86;
    --hand:'Zen Maru Gothic','Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;
    --body:'Noto Sans TC','Zen Maru Gothic','Inter',-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif;
    --shadow:0 10px 26px rgba(120,110,90,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--body);color:var(--ink);background-color:var(--paper);background-image:radial-gradient(ellipse 620px 420px at 10% 6%,rgba(95,155,176,.12),transparent 60%),radial-gradient(ellipse 520px 380px at 92% 16%,rgba(221,143,143,.11),transparent 60%),radial-gradient(ellipse 560px 440px at 72% 96%,rgba(227,182,103,.10),transparent 62%);min-height:100vh;padding-bottom:120px;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:1040px;margin:0 auto;padding:0 18px}

  header{text-align:center;padding:46px 18px 10px}
  .title{font-family:var(--hand);font-weight:700;font-size:clamp(36px,6.5vw,58px);line-height:1.05;color:var(--ink);cursor:text;display:inline-block;padding:2px 16px 14px;outline:none;background-image:linear-gradient(90deg,transparent 2%,rgba(95,155,176,.6) 20%,rgba(221,143,143,.55) 50%,rgba(95,155,176,.6) 80%,transparent 98%);background-repeat:no-repeat;background-size:100% 8px;background-position:center bottom 4px;border-radius:4px}
  .title:hover,.title:focus{background-color:rgba(95,155,176,.07)}
  .subtitle{font-size:15px;color:var(--ink-soft);margin-top:10px}

  .stamps{display:flex;gap:13px;justify-content:center;flex-wrap:wrap;margin:30px 0 4px}
  .stamp{min-width:96px;padding:15px 18px;border-radius:20px;background:rgba(95,155,176,.09);border:1px solid rgba(95,155,176,.22);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .stamp b{font-family:var(--hand);font-size:34px;font-weight:700;line-height:.9;color:var(--terra)}
  .stamp:nth-child(2){background:rgba(127,174,139,.11);border-color:rgba(127,174,139,.28)}
  .stamp:nth-child(2) b{color:var(--sage)}
  .stamp:nth-child(3){background:rgba(227,182,103,.13);border-color:rgba(227,182,103,.34)}
  .stamp:nth-child(3) b{color:#c79a44}
  .stamp span{font-size:12px;margin-top:4px;font-weight:500;color:var(--ink-soft)}

  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-bottom:8px}
  .hero-card{max-width:560px;margin:18px auto 0;background:var(--paper-2);border:1.5px solid #efe6d6;border-radius:26px;padding:22px 22px 18px;text-align:center;box-shadow:var(--shadow)}
  .hero-since{font-size:16px;color:var(--ink);font-weight:500}
  .hero-since b{font-family:var(--hand);font-size:44px;font-weight:700;color:var(--rose);vertical-align:-6px;margin:0 6px}
  .hero-since .hs-sub{display:block;font-size:12px;color:var(--ink-soft);margin-top:4px;letter-spacing:.05em}
  .hero-path{margin:14px 0 14px;min-height:26px}
  .hero-path svg{max-width:100%;display:block;margin:0 auto}
  .hero-next{background:#eef5f6;border-radius:16px;padding:11px 14px}
  .hero-next .hn-label{display:block;font-size:11px;letter-spacing:.1em;color:var(--terra-deep);font-weight:700;margin-bottom:2px}
  .hero-next .hn-name{font-family:var(--hand);font-size:23px;color:var(--ink);font-weight:700}
  .hero-next .hn-date{display:block;font-size:12px;color:var(--ink-soft);margin-top:1px}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:560px;margin:14px auto 4px}
  .tile{padding:15px 8px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .tile b{font-family:var(--hand);font-size:30px;font-weight:700;line-height:.9}
  .tile span{font-size:11px;margin-top:5px;font-weight:500}
  .tile:nth-child(1){background:#e9f1f3} .tile:nth-child(1) b{color:#3c6b78} .tile:nth-child(1) span{color:#5d8088}
  .tile:nth-child(2){background:#fbeae7} .tile:nth-child(2) b{color:#c2706a} .tile:nth-child(2) span{color:#a87b76}
  .tile:nth-child(3){background:#eaf2e7} .tile:nth-child(3) b{color:#5e8a66} .tile:nth-child(3) span{color:#7d9180}
  .tile:nth-child(4){background:#f9f0db} .tile:nth-child(4) b{color:#b78f3c} .tile:nth-child(4) span{color:#9f8c63}
  @media(max-width:560px){ .tiles{grid-template-columns:repeat(2,1fr)} }

  nav{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:30px auto 26px;background:#fff;padding:6px;border:1.5px solid #efe6d6;border-radius:22px;width:fit-content;max-width:100%;box-shadow:var(--shadow)}
  .tab{font-family:var(--body);font-weight:700;font-size:14px;border:none;cursor:pointer;padding:9px 16px;border-radius:16px;background:transparent;color:var(--ink-soft);transition:background .15s,color .15s}
  .tab:hover{color:var(--terra-deep)}
  .tab.active{background:var(--terra);color:#fff;box-shadow:0 4px 12px rgba(95,155,176,.35)}

  .panel{display:none;animation:fade .25s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  .album-grid{columns:230px;column-gap:18px}
  .polaroid{break-inside:avoid;margin:0 0 18px;background:var(--paper-2);padding:9px;border-radius:16px;box-shadow:var(--shadow);transition:transform .18s;cursor:pointer}
  .album-grid .polaroid:nth-child(odd){transform:rotate(-0.8deg)}
  .album-grid .polaroid:nth-child(even){transform:rotate(0.8deg)}
  .polaroid:hover{transform:rotate(0) translateY(-3px)}
  .polaroid .photo{width:100%;display:block;border-radius:11px;background:var(--kraft);aspect-ratio:1/1;object-fit:cover}
  .polaroid .placeholder{width:100%;aspect-ratio:4/3;border-radius:11px;background:linear-gradient(135deg,rgba(95,155,176,.14),rgba(221,143,143,.14));display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--ink-soft)}
  .polaroid .cap{font-family:var(--hand);font-weight:700;font-size:22px;text-align:center;margin:8px 4px 4px;color:var(--ink);line-height:1.15}
  .polaroid .cap small{display:block;font-family:var(--body);font-size:12px;color:var(--ink-soft);font-weight:400;margin-top:2px}

  .timeline{position:relative;max-width:640px;margin:0 auto;padding-left:30px}
  .timeline::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:repeating-linear-gradient(var(--terra) 0 6px,transparent 6px 13px);opacity:.55}
  .tl-item{position:relative;margin-bottom:20px}
  .tl-item::before{content:"";position:absolute;left:-27px;top:5px;width:14px;height:14px;border-radius:50%;background:var(--rose);border:3px solid var(--paper)}
  .tl-date{font-family:var(--hand);font-size:20px;font-weight:700;color:var(--terra);margin-bottom:5px}
  .tl-card{background:var(--paper-2);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px}
  .tl-card h3{margin:0 0 4px;font-size:16px;font-weight:700}
  .tl-card .place{font-size:13px;color:var(--terra-deep);font-weight:500;margin-bottom:8px}
  .tl-card .place::before{content:"📍 "}
  .tl-card p{margin:0;font-size:14px;line-height:1.7;color:var(--ink-soft);white-space:pre-wrap}
  .tl-card img{width:100%;max-height:240px;object-fit:cover;border-radius:11px;margin-top:10px}

  #map{height:440px;border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--kraft-deep);overflow:hidden}
  .leaflet-container{background:#eaf0ee !important;font-family:var(--body)}
  .leaflet-container .leaflet-tile{filter:saturate(.85) brightness(1.03)}
  .place-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .place-chip{background:var(--paper-2);border:1px solid var(--kraft-deep);border-radius:14px;padding:7px 12px;font-size:13px;font-weight:500;cursor:pointer}
  .place-chip::before{content:"📍 "}
  .pin{background:var(--rose);width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 2px 6px rgba(90,110,120,.3)}

  .wish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .wish{background:var(--paper-2);border-radius:14px;box-shadow:var(--shadow);padding:16px}
  .wish h3{margin:0 0 4px;font-size:15px;font-weight:700}
  .wish .note{font-size:13px;color:var(--ink-soft);line-height:1.6;white-space:pre-wrap}
  .wish-actions{display:flex;gap:8px;margin-top:14px}
  .mini-btn{border:none;cursor:pointer;font-family:var(--body);font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:10px}
  .mini-btn.go{background:var(--sage);color:#fff}
  .mini-btn.del{background:var(--kraft);color:var(--ink-soft)}
  .wish-filter{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
  .fchip{background:var(--paper-2);border:1px solid var(--kraft-deep);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft)}
  .fchip.on{background:var(--terra);border-color:var(--terra);color:#fff}
  .wcountry{max-width:780px;margin:0 auto 14px}
  .wc-head{display:flex;align-items:center;gap:10px;padding:13px 4px;cursor:pointer;font-size:16px;border-bottom:1px solid var(--kraft-deep)}
  .wc-head b{font-family:var(--hand);font-size:20px;font-weight:700;color:var(--ink)}
  .wc-count{font-size:12px;color:var(--ink-soft);font-weight:500}
  .wc-arrow{margin-left:auto;transition:transform .2s;color:var(--ink-soft);font-size:13px}
  .wcountry.collapsed .wc-arrow{transform:rotate(-90deg)}
  .wcountry.collapsed .wc-body{display:none}
  .wregion{margin:14px 0}
  .wr-head{font-family:var(--hand);font-size:19px;font-weight:700;color:var(--terra-deep);margin:0 0 8px;padding-left:2px}
  .wr-head::before{content:"~ "}

  .itin-day{background:var(--paper-2);border-radius:16px;box-shadow:var(--shadow);padding:18px 20px;margin:0 auto 16px;max-width:640px}
  .itin-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .itin-dnum{font-family:var(--hand);font-size:26px;font-weight:700;color:var(--terra);line-height:1}
  .itin-date{font-family:var(--hand);font-size:17px;font-weight:600;color:var(--ink-soft)}
  .itin-theme{font-size:15px;font-weight:700;color:var(--ink);margin:8px 0 12px;outline:none;border-radius:6px}
  .itin-theme:focus{background:rgba(95,155,176,.08)}
  .itin-row{display:flex;gap:14px;padding:10px 0;border-bottom:1px dashed var(--kraft-deep);align-items:flex-start}
  .itin-row:last-child{border-bottom:none}
  .itin-time{font-family:var(--hand);font-weight:700;color:var(--terra-deep);font-size:16px;min-width:92px;white-space:nowrap}
  .itin-text{flex:1;font-size:14px;line-height:1.55;color:var(--ink)}
  .itin-row.is-place .itin-text{color:var(--ink);font-weight:500}
  .itin-row.is-place .itin-text::before{content:"📍 "}
  .itin-note{color:var(--ink-soft);font-weight:400;font-size:13px}

  .trip-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
  .trip-chip{background:var(--paper-2);border:1px solid var(--kraft-deep);border-radius:20px;padding:8px 16px;font-weight:600;font-size:14px;cursor:pointer;color:var(--ink-soft)}
  .trip-chip.on{background:var(--terra);border-color:var(--terra);color:#fff}
  .trip-chip.add{background:transparent;border:1px dashed var(--terra);color:var(--terra)}
  .trip-namewrap{text-align:center}
  .trip-name{font-family:var(--hand);font-size:32px;font-weight:700;color:var(--ink);text-align:center;margin:2px 0;outline:none;border-radius:8px;padding:2px 10px;display:inline-block}
  .trip-name:focus{background:rgba(95,155,176,.08)}
  .trip-tools{text-align:center;margin:6px 0 18px}
  .del-trip{background:transparent;border:none;color:var(--ink-soft);cursor:pointer;font-weight:500;font-size:13px}
  .trip-tools .del-trip{display:block;margin:12px auto 0}
  .stop-del{margin-left:6px;border:none;background:transparent;color:var(--rose);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;opacity:.55}
  .itin-row:hover .stop-del{opacity:1}
  .add-link{display:inline-block;margin-top:12px;background:var(--kraft);border:none;border-radius:11px;padding:9px 14px;font-weight:600;font-size:13px;cursor:pointer;color:var(--terra-deep);font-family:var(--body)}
  .add-link:hover{background:rgba(95,155,176,.16)}
  .add-day-wrap{text-align:center;margin-top:4px}
  .geo-search{display:flex;gap:8px}
  .geo-search input{flex:1}
  .geo-results{margin-top:8px;max-height:180px;overflow:auto}
  .geo-item{padding:10px 12px;background:var(--paper-2);border:1px solid var(--kraft-deep);border-radius:11px;margin-bottom:6px;cursor:pointer;font-size:13px;line-height:1.4}
  .geo-item:hover{border-color:var(--terra)}
  .geo-item b{display:block;color:var(--ink);font-size:14px;font-weight:700}
  .geo-item small{color:var(--ink-soft)}
  .geo-msg{font-size:12.5px;color:var(--ink-soft);margin-top:8px}
  .pin-wish{background:var(--sage);width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff}
  .pin-plan{background:var(--honey);color:#6b4f12;width:22px;height:22px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:var(--body)}
  .complete-trip{background:var(--terra);color:#fff;border:none;border-radius:14px;padding:12px 24px;font-family:var(--body);font-weight:700;font-size:15px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s}
  .complete-trip:hover{transform:translateY(-2px)}
  .complete-trip.is-done{background:#fff;color:var(--ink-soft);border:1px solid var(--kraft-deep);box-shadow:none}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(8px);background:var(--terra-deep);color:#fff;padding:12px 20px;border-radius:24px;font-weight:600;font-size:14px;z-index:1400;box-shadow:0 10px 26px rgba(67,122,140,.4);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pp-btn{border:none;border-radius:9px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;font-family:var(--body)}
  .pp-btn.add{background:var(--terra);color:#fff}
  .pp-btn.del{background:var(--kraft);color:var(--ink-soft)}

  .empty{text-align:center;padding:48px 26px;color:var(--ink-soft);background:#fff;border:2px dashed #ecdfca;border-radius:26px;max-width:460px;margin:12px auto}
  .empty .emoji{font-size:48px;line-height:1;margin-bottom:14px}
  .empty .big{font-family:var(--hand);font-size:25px;font-weight:700;color:var(--terra-deep)}
  .empty p{font-size:14px;margin:9px 0 0;line-height:1.75}
  .foot{text-align:center;color:var(--ink-soft);font-family:var(--hand);font-size:18px;font-weight:500;padding:18px 20px 34px;opacity:.9}
  .date-range{display:flex;align-items:center;gap:8px}
  .date-range input[type=date]{flex:1;min-width:0}
  .dr-arrow{color:var(--ink-soft);font-size:16px}
  .modal-hint{font-size:12px;color:var(--ink-soft);margin:8px 0 0;line-height:1.6}
  .cal-summary{font-size:13px;color:var(--terra-deep);background:#eef5f6;border-radius:12px;padding:8px 12px;margin:4px 0 8px;font-weight:500}
  .cal{background:#fff;border:1.5px solid #efe6d6;border-radius:18px;padding:12px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-title{font-family:var(--hand);font-weight:700;font-size:18px;color:var(--ink)}
  .cal-nav{border:none;background:#f3efe6;color:var(--terra-deep);width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;line-height:1}
  .cal-nav:hover{background:#e7eff0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-wd{text-align:center;font-size:11px;color:var(--ink-soft);padding:3px 0;font-weight:700}
  .cal-cell{height:40px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink);border-radius:10px;cursor:pointer;user-select:none}
  .cal-cell.empty{cursor:default}
  .cal-cell.day:hover{background:#eef5f6}
  .cal-cell.inrange{background:#e3eef0;border-radius:0}
  .cal-cell.sel{background:var(--terra);color:#fff;font-weight:700}
  .cal-cell.sel.start{border-radius:11px 0 0 11px}
  .cal-cell.sel.end{border-radius:0 11px 11px 0}
  .cal-cell.sel.single{border-radius:11px}
  .day-del{margin-left:auto;background:none;border:none;color:#cbb89c;cursor:pointer;font-size:13px;line-height:1;padding:3px 7px;border-radius:9px;align-self:center}
  .day-del:hover{background:rgba(224,138,134,.16);color:var(--rose)}
  .pac-host{margin:2px 0 0}
  .pac-host gmp-place-autocomplete{width:100%}
  .day-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
  .dt-start{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:5px}
  .dt-start input[type=time]{font-family:var(--body);font-size:13px;border:1.5px solid #efe6d6;border-radius:10px;padding:5px 8px;background:#fff;color:var(--ink)}
  .dt-mode,.dt-opt{font-family:var(--body);font-weight:700;font-size:13px;border:none;cursor:pointer;border-radius:12px;padding:7px 12px}
  .dt-mode{background:#eef5f6;color:var(--terra-deep)}
  .dt-mode:hover{background:#e2eef0}
  .dt-opt{background:var(--terra);color:#fff;box-shadow:0 3px 10px rgba(95,155,176,.3)}
  .dt-opt:hover{filter:brightness(1.05)}
  .dt-opt:disabled{opacity:.6;cursor:default}
  .itin-row[data-editstop]{cursor:pointer}
  .leg-chip{font-size:12px;color:var(--terra-deep);background:#eef5f6;border-radius:20px;padding:3px 11px;margin:3px 0 3px 34px;display:inline-block;font-weight:500}

  .fab{position:fixed;right:22px;bottom:22px;z-index:50;background:var(--terra);color:#fff;border:none;cursor:pointer;border-radius:50px;padding:14px 22px;font-family:var(--body);font-weight:700;font-size:15px;box-shadow:0 8px 22px rgba(95,155,176,.45);display:flex;align-items:center;gap:8px;transition:transform .12s}
  .fab:hover{transform:translateY(-2px)}

  .overlay{position:fixed;inset:0;background:rgba(65,80,90,.45);z-index:1200;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--paper-2);border:1px solid var(--kraft-deep);border-radius:20px;max-width:480px;width:100%;padding:24px;box-shadow:0 24px 60px rgba(65,80,90,.28);margin:auto}

  #trashBtn{position:fixed;top:12px;left:14px;z-index:60;background:rgba(255,255,255,.82);border:1px solid #e4e1d8;color:#717784;border-radius:20px;padding:6px 11px;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;gap:5px}
  #trashBtn:hover{color:#41505a}

  /* ---------- load ---------- */
  async function load(){
    var t = await store.get("settings:title");
    if(t) $("coupleTitle").textContent = t;
    var keys = await store.list("entry:");
    for(var i=0;i<keys.length;i++){
      var raw = await store.get(keys[i]);
      if(raw){ try{ entries.push(JSON.parse(raw)); }catch(e){} }
    }
    var w = await store.get("wishlist");
    if(w){ try{ wishlist = JSON.parse(w); }catch(e){} }
    var tr = await store.get("trips");
    if(tr){ try{ trips = JSON.parse(tr); }catch(e){} }
    if(!trips || !trips.length){ trips=[buildSeedTrip()]; await saveTrips(); }
    currentTripId = trips[0].id;
    var fp = await store.get("footprints");
    if(fp){ try{ footprints = JSON.parse(fp); }catch(e){} }
    var trR = await store.get("trash");
    if(trR){ try{ trash = JSON.parse(trR); }catch(e){} }
    purgeOldTrash(); updateTrashBadge();
    // 把舊版「完成旅程」直接灌進相簿的自動點(有 fromStop、沒照片)搬成純地圖足跡
    var migrated=[];
    entries = entries.filter(function(e){ if(e.fromStop && !e.photo){ migrated.push(e); return false; } return true; });
    if(migrated.length){
      for(var j=0;j<migrated.length;j++){
        var e=migrated[j];
        if(!footprints.some(function(f){return f.fromStop===e.fromStop;})) footprints.push({id:e.id,title:e.title,date:e.date,place:e.place,lat:e.lat,lng:e.lng,note:e.note,fromStop:e.fromStop,fromTrip:e.fromTrip});
        await store.del("entry:"+e.id);
      }
      await store.set("footprints", JSON.stringify(footprints));
    }
    renderAll();
  }

  /* ---------- live sync: 回到 App / 切回分頁時，自動重抓最新資料 ---------- */
  async function reloadData(){
    var t = await store.get("settings:title");
    if(t) $("coupleTitle").textContent = t;
    var newEntries=[];
    var keys = await store.list("entry:");
    for(var i=0;i<keys.length;i++){
      var raw = await store.get(keys[i]);
      if(raw){ try{ newEntries.push(JSON.parse(raw)); }catch(e){} }
    }
    entries = newEntries.filter(function(e){ return !(e.fromStop && !e.photo); });
    var w = await store.get("wishlist"); wishlist = [];
    if(w){ try{ wishlist = JSON.parse(w); }catch(e){} }
    var tr = await store.get("trips"); 
    if(tr){ try{ trips = JSON.parse(tr); }catch(e){} }
    if(!trips || !trips.length){ trips=[buildSeedTrip()]; await saveTrips(); }
    if(!trips.some(function(x){return x.id===currentTripId;})) currentTripId = trips[0].id;
    var fp = await store.get("footprints"); footprints = [];
    if(fp){ try{ footprints = JSON.parse(fp); }catch(e){} }
    var trR = await store.get("trash"); trash = [];
    if(trR){ try{ trash = JSON.parse(trR); }catch(e){} }
    purgeOldTrash(); updateTrashBadge();

  }

  function renderStats(){
    // 在一起天數（2023-05-06 起算）
    var d0 = new Date(2023,4,6);
    var n = new Date();
    var a = new Date(d0.getFullYear(),d0.getMonth(),d0.getDate());
    var b = new Date(n.getFullYear(),n.getMonth(),n.getDate());
    var days = Math.floor((b - a)/86400000) + 1;
    var dt = $("daysTogether"); if(dt) dt.textContent = days>0 ? days.toLocaleString() : 0;

    // 下一趟旅行倒數
    var today = b, best=null, bestDate=null;
    trips.forEach(function(t){
      if(t.done) return;
      var ds = (t.days||[]).map(function(x){return x.date;}).filter(Boolean).sort();
      if(!ds.length) return;
      var start = new Date(ds[0]+"T00:00:00");
      if(start>=today && (!bestDate || start<bestDate)){ bestDate=start; best=t; }
    });
    var nn=$("nextTripName"), nd=$("nextTripDate");
    if(best && nn){
      var diff = Math.round((bestDate - today)/86400000);
      nn.textContent = best.name || "未命名旅程";
      nd.textContent = diff===0 ? "就是今天 🎉" : ("倒數 " + diff + " 天 · " + fmtDate(bestDate.toISOString().slice(0,10)));
    } else if(nn){
      nn.textContent = "還沒安排 ✈️";
      nd.textContent = "在「行程」幫某天填上日期，這裡就會自動倒數";
    }

    // 統計小方塊
    var placeCount = footprints.length + entries.filter(function(e){return e.lat!=null;}).length;
    var tiles=[
      {n:trips.length, l:"趟旅程"},
      {n:entries.length, l:"段回憶"},
      {n:placeCount, l:"個足跡"},
      {n:wishlist.length, l:"個想去"}
    ];
    var ht=$("homeTiles");
    if(ht) ht.innerHTML = tiles.map(function(t){return '<div class="tile"><b>'+t.n+'</b><span>'+t.l+'</span></div>';}).join("");

    renderHeroPath(placeCount);
  }

  /* ---------- trips (editable itineraries) ---------- */
  function buildSeedTrip(){
    var stops=[];
    ITINERARY.forEach(function(d){
      var spots=ITIN_SPOTS.filter(function(s){return s.day===d.day;});
      var pi=0;
      d.rows.forEach(function(r){
        var s={id:uid(), dayN:d.day, time:r.t, name:r.x, country:"", region:"", note:"", lat:null, lng:null};
        if(r.p && spots[pi]){ s.lat=spots[pi].lat; s.lng=spots[pi].lng; s.country="日本"; s.region=spots[pi].name; pi++; }
        stops.push(s);
      });
    });
    return { id:"seed-kansai", name:"關西七日遊",
      days: ITINERARY.map(function(d){return {n:d.day, date:d.date, theme:d.theme};}),
      stops:stops };
  }
  async function saveTrips(){ await store.set("trips", JSON.stringify(trips)); }
  function curTrip(){ return trips.find(function(t){return t.id===currentTripId;}) || trips[0]; }

  var legCache={};
  function toMin(t){ if(!t||t.indexOf(":")<0) return null; var p=t.split(":"),h=+p[0],m=+p[1]; if(isNaN(h)||isNaN(m)) return null; return h*60+m; }
  function toHM(min){ min=((Math.round(min)%1440)+1440)%1440; var h=Math.floor(min/60),m=min%60; return ("0"+h).slice(-2)+":"+("0"+m).slice(-2); }
  function hav(a,b){ var R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180; var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2); return 2*R*Math.asin(Math.sqrt(x)); }
  function daySorted(t,dayN){
    return t.stops.filter(function(s){return s.dayN===dayN;}).slice().sort(function(a,b){
      var ao=(a.order!=null),bo=(b.order!=null);
      if(ao&&bo) return a.order-b.order;
      if(ao!==bo) return ao?-1:1;
      return (a.time||"").localeCompare(b.time||"");
    });
  }
  async function routeLeg(from,to,mode){
    var key=from.id+"|"+to.id+"|"+mode;
    if(legCache[key]) return legCache[key];
    var body={ origin:{location:{latLng:{latitude:from.lat,longitude:from.lng}}}, destination:{location:{latLng:{latitude:to.lat,longitude:to.lng}}}, travelMode:mode };
    if(mode==="DRIVE") body.routingPreference="TRAFFIC_AWARE";
    var res=await fetch("https://routes.googleapis.com/directions/v2:computeRoutes",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Goog-Api-Key":window.GMAPS_KEY,"X-Goog-FieldMask":"routes.duration,routes.distanceMeters"},
      body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error("routes "+res.status);
    var data=await res.json();
    if(!data.routes||!data.routes.length) throw new Error("no route");
    var sec=parseInt(data.routes[0].duration,10)||0, m=data.routes[0].distanceMeters||0;
    legCache[key]={min:Math.round(sec/60), km:Math.round(m/100)/10};
    return legCache[key];
  }
  async function optimizeDay(t,dayN){
    var d=t.days.find(function(x){return x.n===dayN;}); if(!d) return;
    var mode=d.travelMode||"DRIVE";
    var seq=daySorted(t,dayN);
    var locatedIdx=[]; seq.forEach(function(s,i){ if(s.lat!=null) locatedIdx.push(i); });
    if(locatedIdx.length<2){ toast("這天要有至少 2 個『有地圖座標』的景點才能排順路 🗺️"); return; }
    var located=locatedIdx.map(function(i){return seq[i];});
    var ordered=[located[0]], pool=located.slice(1);
    while(pool.length){ var last=ordered[ordered.length-1],bi=0,bd=Infinity; pool.forEach(function(p,idx){var dd=hav(last,p); if(dd<bd){bd=dd;bi=idx;}}); ordered.push(pool.splice(bi,1)[0]); }
    locatedIdx.forEach(function(i,k){ seq[i]=ordered[k]; });
    seq.forEach(function(s,i){ s.order=i+1; });
    toast("計算交通時間中…"+(mode==="TRANSIT"?"🚆":"🚗"));
    var ok=true;
    try{ for(var i=0;i<ordered.length-1;i++){ await routeLeg(ordered[i],ordered[i+1],mode); } }
    catch(e){ ok=false; }
    var clock=toMin(d.startTime); if(clock==null) clock=toMin(ordered[0].time); if(clock==null) clock=540;
    for(var j=0;j<ordered.length;j++){
      var s=ordered[j], stay=(toMin(s.endTime)!=null&&toMin(s.time)!=null)?(toMin(s.endTime)-toMin(s.time)):60; if(stay<=0||stay>600) stay=60;
      s.time=toHM(clock); s.endTime=toHM(clock+stay); clock+=stay;
      if(j<ordered.length-1){ var lg=legCache[ordered[j].id+"|"+ordered[j+1].id+"|"+mode]; if(lg) clock+=lg.min; }
    }
    await saveTrips(); renderTrips(); refreshMap();
    toast(ok?"排好順路＋算好時間了 ✨":"順路排好了，但交通時間查詢失敗：請確認已啟用 Routes API 並加進金鑰白名單 🙏");
  }

  function renderTrips(){
    var el=$("itinerary");
    var bar='<div class="trip-bar">'+trips.map(function(t){
      return '<span class="trip-chip'+(t.id===(curTrip()&&curTrip().id)?" on":"")+'" data-trip="'+t.id+'">'+esc(t.name)+'</span>';
    }).join("")+'<span class="trip-chip add" id="newTrip">＋ 新增旅程</span></div>';

    if(!trips.length){ el.innerHTML=bar+emptyState("還沒有旅程","按「＋ 新增旅程」開一趟新的，再一天一天把景點排進去。","✈️"); bindTripBar(); return; }

    var t=curTrip(); currentTripId=t.id;
    var days=t.days.slice().sort(function(a,b){return a.n-b.n;});
    var detail='<div class="trip-namewrap"><div class="trip-name" contenteditable="true" spellcheck="false" data-ename="1">'+esc(t.name)+'</div></div>'+
      '<div class="trip-tools">'+
        '<button class="complete-trip'+(t.done?' is-done':'')+'" data-done="'+t.id+'">'+(t.done?'✓ 已完成這趟（再點同步新景點）':'✓ 我們完成這趟旅行了，加進足跡')+'</button>'+
        '<button class="del-trip" data-deltrip="'+t.id+'">🗑 刪除這個旅程</button>'+
      '</div>';

    detail += days.map(function(d){
      var mode=d.travelMode||"DRIVE";
      var stops=daySorted(t,d.n);
      var rows;
      if(stops.length){
        rows="";
        stops.forEach(function(s,i){
          if(i>0){ var prev=stops[i-1]; if(prev.lat!=null && s.lat!=null){ var lg=legCache[prev.id+"|"+s.id+"|"+mode]; if(lg){ rows+='<div class="leg-chip">'+(mode==="TRANSIT"?"🚆":"🚗")+' 約 '+lg.min+' 分'+(lg.km?' ・ '+lg.km+' km':'')+'</div>'; } } }
          var hasPlace=(s.lat!=null)||s.region||s.country;

            '<button class="stop-del" data-delstop="'+s.id+'" title="刪除">×</button></div>';
        });
      } else { rows='<div class="itin-row"><span class="itin-text" style="color:var(--ink-soft)">這天還沒排景點</span></div>'; }
      return '<div class="itin-day">'+
        '<div class="itin-head"><span class="itin-dnum">DAY '+d.n+'</span>'+
          (d.date?'<span class="itin-date">'+(+d.date.slice(5,7))+'/'+(+d.date.slice(8))+'</span>':'')+
          (days.length>1?'<button class="day-del" data-delday="'+d.n+'" title="刪除這天">✕</button>':'')+'</div>'+
        '<div class="itin-theme" contenteditable="true" spellcheck="false" data-eday="'+d.n+'">'+esc(d.theme||"（點這裡寫今天主題）")+'</div>'+
        '<div class="day-tools">'+
          '<label class="dt-start">出發 <input type="time" data-starttime="'+d.n+'" value="'+(d.startTime||"")+'"></label>'+
          '<button class="dt-mode" data-mode="'+d.n+'" title="切換交通方式">'+(mode==="TRANSIT"?"🚆 電車":"🚗 開車")+'</button>'+
          '<button class="dt-opt" data-opt="'+d.n+'">🪄 排順路＋算時間</button>'+
        '</div>'+
        rows+
        '<button class="add-link" data-addstop="'+d.n+'">＋ 加景點</button>'+
      '</div>';
    }).join("");

    detail += '<div class="add-day-wrap"><button class="add-link" id="addDay">＋ 加一天</button></div>';

    el.innerHTML = bar + detail;
    bindTripBar();
    // trip name edit
    var nm=el.querySelector('[data-ename]');
    nm.addEventListener("blur",function(){ t.name=nm.textContent.trim()||"未命名旅程"; saveTrips(); renderTrips(); });
    nm.addEventListener("keydown",function(e){ if(e.key==="Enter"){e.preventDefault();nm.blur();} });
    // day theme edit
    el.querySelectorAll('[data-eday]').forEach(function(th){
      th.addEventListener("blur",function(){ var n=+th.getAttribute("data-eday"); var dd=t.days.find(function(x){return x.n===n;}); if(dd){ var v=th.textContent.trim(); dd.theme=(v==="（點這裡寫今天主題）")?"":v; saveTrips(); } });
    });
    // delete trip (two-click confirm)
    el.querySelectorAll('[data-deltrip]').forEach(function(b){
      b.addEventListener("click",function(){
        if(b.dataset.armed){ trashItem("trip",t); trips=trips.filter(function(x){return x.id!==t.id;}); currentTripId=trips.length?trips[0].id:null; saveTrips(); renderAll(); }
        else { b.dataset.armed="1"; b.textContent="⚠️ 再點一次確認刪除"; setTimeout(function(){if(b){b.dataset.armed="";b.textContent="🗑 刪除這個旅程";}},3000); }
      });
    });
    // add stop / add day
    el.querySelectorAll('[data-done]').forEach(function(b){
      b.addEventListener("click",function(){
        completeTrip(t).then(function(added){
          if(added>0){ toast("已加入 "+added+" 個足跡 👣"); var mt=document.querySelector('[data-tab="map"]'); if(mt) mt.click(); }
          else { toast("沒有新的足跡可加入（可能已加過，或景點沒有座標）"); }
        });
      });
    });
    el.querySelectorAll('[data-addstop]').forEach(function(b){ b.addEventListener("click",function(){ openStop(+b.getAttribute("data-addstop")); }); });
    var ad=$("addDay"); if(ad) ad.addEventListener("click",function(){ var max=t.days.reduce(function(m,x){return Math.max(m,x.n);},0); var sorted=t.days.slice().sort(function(a,b){return a.n-b.n;}); var last=sorted[sorted.length-1]; var nd=""; if(last&&last.date){ var dd=new Date(last.date+"T00:00:00"); dd.setDate(dd.getDate()+1); nd=fmtISO(dd);} t.days.push({n:max+1,date:nd,theme:""}); saveTrips(); renderTrips(); });

  function removeDay(t,n){

    var remaining=t.days.filter(function(x){return x.n!==n;}).sort(function(a,b){return a.n-b.n;});
    if(!remaining.length){ toast("至少要保留一天"); return; }
    var map={}; remaining.forEach(function(d,i){ map[d.n]=i+1; });
    t.stops.forEach(function(s){ if(map[s.dayN]) s.dayN=map[s.dayN]; });

  async function restoreTrash(tid){
    var i = trash.findIndex(function(r){return r.tid===tid;});

    var r = trash[i], d = r.data;
    if(r.type==="trip"){ trips.push(d); currentTripId=currentTripId||d.id; await saveTrips(); }
    else if(r.type==="footprint"){ footprints.push(d); await store.set("footprints",JSON.stringify(footprints)); }
    else if(r.type==="wishlist"){ wishlist.push(d); await store.set("wishlist",JSON.stringify(wishlist)); }
    else if(r.type==="entry"){ await store.set("entry:"+d.id, JSON.stringify(d)); if(!entries.some(function(x){return x.id===d.id;})) entries.push(d); }
    else if(r.type==="stop"){ var tp=trips.find(function(x){return x.id===d.tripId;}); if(!tp){ toast("原本的旅程已不在，請先還原旅程"); return; } if(!tp.stops.some(function(x){return x.id===d.stop.id;})) tp.stops.push(d.stop); await saveTrips(); }

        name:nm, country:$("stopCountry").value.trim(), region:$("stopRegion").value.trim(),
        note:$("stopNote").value.trim(),
        lat:stopPickCoords?stopPickCoords.lat:null, lng:stopPickCoords?stopPickCoords.lng:null });
    }
    await saveTrips(); $("stopOverlay").classList.remove("show"); renderTrips(); refreshMap();
  });
  ["tripOverlay","stopOverlay"].forEach(function(o){
    $(o).addEventListener("click",function(ev){ if(ev.target===$(o)) $(o).classList.remove("show"); });
  });

  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click",function(){
      document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".panel").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");
      var id=t.getAttribute("data-tab");
      $(id==="map"?"map-panel":id).classList.add("active");
      if(id==="map"){ initMainMap(); setTimeout(function(){ if(mapMain){ google.maps.event.trigger(mapMain,"resize"); refreshMap(); } },180); }
    });
  });

  /* ---------- memory modal ---------- */
  var photoData=null;
  function openMem(prefill){
    prefill=prefill||{};
    if(mapInfo){ try{mapInfo.close();}catch(e){} }
    editingId=null; photoData=null; convertingFpId=prefill.fpId||null;
    pickLat=(prefill.lat!=null)?prefill.lat:null; pickLng=(prefill.lng!=null)?prefill.lng:null;
    $("memModalTitle").textContent=prefill.fpId?"補上這個足跡的回憶":"新增一段回憶";
    $("mTitle").value=prefill.title||"";
    $("mDate").value=prefill.date||new Date().toISOString().slice(0,10);
    $("mPlace").value=prefill.place||""; $("mNote").value=prefill.note||"";
    $("mPreview").style.display="none";
    $("coordHint").textContent=(pickLat!=null)?"已標記位置 ✓":"尚未標記位置";
    if(pickMarker){pickMarker.setMap(null);pickMarker=null;}
    $("memOverlay").classList.add("show");
    setTimeout(function(){ initPickMap(); if(mapPick){ google.maps.event.trigger(mapPick,"resize"); } if(pickLat!=null) setPickMarker(pickLat,pickLng,8); },120);
  }
  function openEdit(e){
    editingId=e.id; photoData=e.photo||null; convertingFpId=null;
    $("memModalTitle").textContent="編輯回憶";
    $("mTitle").value=e.title||""; $("mDate").value=e.date||""; $("mPlace").value=e.place||""; $("mNote").value=e.note||"";
    pickLat=e.lat; pickLng=e.lng;
    if(e.photo){$("mPreview").src=e.photo;$("mPreview").style.display="block";}else{$("mPreview").style.display="none";}
    $("coordHint").textContent=(e.lat!=null)?"已標記位置 ✓":"尚未標記位置";
    $("memOverlay").classList.add("show");
    setTimeout(function(){ initPickMap(); if(mapPick){ google.maps.event.trigger(mapPick,"resize"); } if(e.lat!=null) setPickMarker(e.lat,e.lng,6); },120);
  }

  $("fab").addEventListener("click",function(){openMem();});
  $("memCancel").addEventListener("click",function(){$("memOverlay").classList.remove("show");});
  $("wishCancel").addEventListener("click",function(){$("wishOverlay").classList.remove("show");});
  $("fileBtn").addEventListener("click",function(){$("mPhoto").click();});

  $("mPhoto").addEventListener("change",function(ev){
    var f=ev.target.files[0]; if(!f) return;
    var img=new Image(), rd=new FileReader();
    rd.onload=function(){ img.onload=function(){
      var max=1200, w=img.width, h=img.height;
      if(w>h&&w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      photoData=c.toDataURL("image/jpeg",0.78);
      $("mPreview").src=photoData; $("mPreview").style.display="block";
    }; img.src=rd.result; };
    rd.readAsDataURL(f);
  });

  $("memSave").addEventListener("click",async function(){
    var title=$("mTitle").value.trim();
    if(!title){ $("mTitle").focus(); $("mTitle").style.borderColor="var(--terra)"; return; }
    var obj={ id:editingId||uid(), title:title, date:$("mDate").value, place:$("mPlace").value.trim(),
              lat:pickLat, lng:pickLng, note:$("mNote").value.trim(), photo:photoData };
    if(editingId){ entries=entries.map(function(e){return e.id===editingId?obj:e;}); }
    else { entries.push(obj); }
    await store.set("entry:"+obj.id, JSON.stringify(obj));
    if(convertingFpId){ footprints=footprints.filter(function(f){return f.id!==convertingFpId;}); await store.set("footprints",JSON.stringify(footprints)); convertingFpId=null; }
    $("memOverlay").classList.remove("show");
    renderAll();
  });

  /* ---------- wishlist ---------- */
  var wLat=null, wLng=null, wReady=false;
  function fillWishFrom(name,country,region,lat,lng){
    wLat=(lat==null?null:lat); wLng=(lng==null?null:lng);
    if(name) $("wTitle").value=name;
    $("wCountry").value=country||""; $("wRegion").value=region||"";
    $("wResults").innerHTML='<div class="geo-msg">已帶入：'+esc([country,region].filter(Boolean).join("・")||name||"")+' ✓（座標已記錄，會出現在地圖上）</div>';
  }
  var wReadySvc=null, wPlacesSvc=null, wSearchTimer=null;
  async function initWishAutocomplete(){
    if(wReady || !window.gmReady || !window.google || !google.maps.places) return;
    try{
      wReadySvc=new google.maps.places.AutocompleteService();
      wPlacesSvc=new google.maps.places.PlacesService(document.createElement("div"));
      $("wSearchHost").style.display="none";
      $("wSearch").style.display="";
      $("wSearch").addEventListener("input", onWishType);
      wReady=true;
    }catch(e){ $("wResults").innerHTML='<div class="geo-msg">搜尋載入失敗，可直接手動輸入名稱／國家／城市 🙏</div>'; }
  }
  function onWishType(){
    var q=$("wSearch").value.trim();
    clearTimeout(wSearchTimer);
    if(q.length<2){ $("wResults").innerHTML=""; return; }
    wSearchTimer=setTimeout(function(){
      wReadySvc.getPlacePredictions({input:q, language:"zh-TW"}, function(preds,status){
        if(status!==google.maps.places.PlacesServiceStatus.OK || !preds || !preds.length){ $("wResults").innerHTML='<div class="geo-msg">找不到結果，可直接手動輸入 🙏</div>'; return; }
        $("wResults").innerHTML=preds.slice(0,5).map(function(p){
          var main=(p.structured_formatting&&p.structured_formatting.main_text)||p.description;
          return '<div class="geo-item" data-pid="'+p.place_id+'"><b>'+esc(main)+'</b><small>'+esc(p.description)+'</small></div>';
        }).join("");
        $("wResults").querySelectorAll("[data-pid]").forEach(function(it){ it.addEventListener("click",function(){ pickWishPlace(it.getAttribute("data-pid")); }); });
      });
    },350);
  }
  function pickWishPlace(pid){
    $("wResults").innerHTML='<div class="geo-msg">讀取地點中…</div>';
    wPlacesSvc.getDetails({placeId:pid, fields:["name","geometry","address_components"]}, function(place,status){
      if(status!==google.maps.places.PlacesServiceStatus.OK || !place || !place.geometry){ $("wResults").innerHTML='<div class="geo-msg">讀取失敗，可手動輸入 🙏</div>'; return; }
      var country="", region="";
      (place.address_components||[]).forEach(function(c){
        if(c.types.indexOf("country")>=0) country=c.long_name;
        if(!region && (c.types.indexOf("locality")>=0 || c.types.indexOf("administrative_area_level_1")>=0)) region=c.long_name;
      });
      $("wSearch").value=place.name||"";
      fillWishFrom(place.name||"", country, region, place.geometry.location.lat(), place.geometry.location.lng());
    });
  }
  function openWishModal(){
    $("wTitle").value=""; $("wCountry").value=""; $("wRegion").value=""; $("wNote").value=""; $("wResults").innerHTML=""; wLat=wLng=null;
    if($("wSearch")) $("wSearch").value="";
    if($("wSearchHost")) $("wSearchHost").style.display="none";
    if($("wSearch")) $("wSearch").style.display="";
    $("wishOverlay").classList.add("show");
    if(window.gmReady) initWishAutocomplete();
    else $("wResults").innerHTML='<div class="geo-msg">地圖搜尋載入中…（沒反應的話可直接手動輸入）</div>';
  }

  $("wishSave").addEventListener("click",async function(){
    var t=$("wTitle").value.trim(); if(!t){$("wTitle").focus();return;}
    wishlist.push({id:uid(),title:t,country:$("wCountry").value.trim(),region:$("wRegion").value.trim(),note:$("wNote").value.trim(),lat:wLat,lng:wLng});
    await store.set("wishlist", JSON.stringify(wishlist));
    wLat=wLng=null;
    $("wishOverlay").classList.remove("show");
    renderAll();
  });
  async function delWish(id){ var w=wishlist.find(function(x){return x.id===id;}); if(w) await trashItem("wishlist",w); wishlist=wishlist.filter(function(w){return w.id!==id;}); await store.set("wishlist",JSON.stringify(wishlist)); renderAll(); }
  function wishToMemory(id){
    var w=wishlist.find(function(x){return x.id===id;}); if(!w) return;
    delWish(id);
    var place=[w.country,w.region].filter(Boolean).join("・");
    openMem({title:w.title, note:w.note, place:place, lat:w.lat, lng:w.lng});
  }

  /* ---------- lightbox ---------- */
  function openLight(id){
    var e=entries.find(function(x){return x.id===id;}); if(!e) return;
    $("lightInner").innerHTML =
      (e.photo?'<img src="'+e.photo+'" alt="">':'')+
      '<div class="lcap">'+esc(e.title||"無題")+'</div>'+
      '<div class="lnote">'+(e.place?'📍 '+esc(e.place)+'　':'')+fmtDate(e.date)+
        (e.note?'<br><br>'+esc(e.note):'')+'</div>'+
      '<button class="ldel" data-edit="'+e.id+'">✎ 編輯</button> '+
      '<button class="ldel" data-del="'+e.id+'">🗑 刪除這段回憶</button>';
    $("light").classList.add("show");
    $("lightInner").querySelector("[data-del]").addEventListener("click",async function(ev){
      ev.stopPropagation();
      await trashItem("entry",e);
      await store.del("entry:"+e.id);
      entries=entries.filter(function(x){return x.id!==e.id;});
      $("light").classList.remove("show"); renderAll();
    });
    $("lightInner").querySelector("[data-edit]").addEventListener("click",function(ev){
      ev.stopPropagation(); $("light").classList.remove("show"); openEdit(e);
    });
  }
  $("light").addEventListener("click",function(ev){ if(ev.target===$("light")) $("light").classList.remove("show"); });

  /* ---------- title save ---------- */
  var tEl=$("coupleTitle"), tTimer;
  tEl.addEventListener("input",function(){ clearTimeout(tTimer); tTimer=setTimeout(function(){store.set("settings:title",tEl.textContent.trim());},600); });
  tEl.addEventListener("keydown",function(e){ if(e.key==="Enter"){e.preventDefault();tEl.blur();} });

  /* close modals on overlay click */
  ["memOverlay","wishOverlay"].forEach(function(o){
    $(o).addEventListener("click",function(ev){ if(ev.target===$(o)) $(o).classList.remove("show"); });
  });

  var __started=false;
  window.__startApp = function(){ if(__started) return; __started=true; load(); };
})();
</script>

  const db = getFirestore(app);
  const COL = "appdata";

  window.cloudStore = {
    async get(k){ const s = await getDoc(doc(db, COL, k)); return s.exists() ? s.data().value : null; },
    async set(k, v){ await setDoc(doc(db, COL, k), { key: k, value: v }); return { key: k, value: v }; },
    async del(k){ await deleteDoc(doc(db, COL, k)); },
    async list(prefix){ const qy = query(collection(db, COL), where("key", ">=", prefix), where("key", "<", prefix + "\uf8ff")); const snap = await getDocs(qy); return snap.docs.map(d => d.id); }
